<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rutinapp — Planificador de Hábitos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a18;
      --bg2: #242422;
      --bg3: #2C2C2A;
      --text: #F1EFE8;
      --text2: #B4B2A9;
      --text3: #5F5E5A;
      --border: rgba(241,239,232,0.1);
      --border2: rgba(241,239,232,0.2);
      --accent: #7F77DD;
      --accent-light: #26215C;
      --accent-text: #AFA9EC;
      --green: #97C459;
      --green-bg: #173404;
      --amber: #EF9F27;
      --amber-bg: #412402;
      --red: #F09595;
      --red-bg: #501313;
    }

    body.light {
      --bg: #FAFAF8;
      --bg2: #F1EFE8;
      --bg3: #ffffff;
      --text: #2C2C2A;
      --text2: #5F5E5A;
      --text3: #888780;
      --border: rgba(44,44,42,0.12);
      --border2: rgba(44,44,42,0.22);
      --accent: #534AB7;
      --accent-light: #EEEDFE;
      --accent-text: #3C3489;
      --green: #3B6D11;
      --green-bg: #EAF3DE;
      --amber: #BA7517;
      --amber-bg: #FAEEDA;
      --red: #A32D2D;
      --red-bg: #FCEBEB;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      min-height: 100vh;
      font-size: 14px;
      transition: background 0.3s, color 0.3s;
    }

    #app { max-width: 760px; margin: 0 auto; padding: 0 0 4rem; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 0.5px solid var(--border);
    }
    .logo {
      font-family: 'Syne', sans-serif; font-size: 22px;
      font-weight: 700; color: var(--accent); letter-spacing: -0.5px;
    }
    .logo span {
      color: var(--text2); font-weight: 300;
      font-family: 'DM Sans', sans-serif; font-size: 13px; margin-left: 8px;
    }
    .toggle-theme {
      background: var(--bg2); border: 0.5px solid var(--border2);
      border-radius: 20px; padding: 6px 14px; cursor: pointer;
      font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px;
      transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .toggle-theme:hover { background: var(--bg3); }

    .week-header { padding: 1.25rem 1.5rem 0.5rem; }
    .week-label {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text3); margin-bottom: 10px;
    }
    .week-days { display: flex; gap: 6px; }
    .day-pill {
      flex: 1; text-align: center; padding: 8px 4px;
      border-radius: 10px; border: 0.5px solid var(--border);
      background: var(--bg3); cursor: pointer; transition: all 0.15s;
    }
    .day-pill.active { background: var(--accent); border-color: var(--accent); }
    .day-pill .dname { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
    .day-pill.active .dname { color: rgba(255,255,255,0.7); }
    .day-pill .dnum { font-size: 16px; font-weight: 500; color: var(--text); margin-top: 2px; }
    .day-pill.active .dnum { color: #fff; }

    .stats-row { display: flex; gap: 10px; padding: 1rem 1.5rem; }
    .stat-card {
      flex: 1; background: var(--bg3); border: 0.5px solid var(--border);
      border-radius: 12px; padding: 12px 14px;
    }
    .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; }
    .stat-value span { font-size: 12px; font-weight: 400; color: var(--text2); }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem 0.5rem;
    }
    .section-title { font-size: 13px; font-weight: 500; color: var(--text2); letter-spacing: 0.3px; }
    .btn-add {
      display: flex; align-items: center; gap: 5px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 7px 14px; font-size: 12px;
      cursor: pointer; font-weight: 500; transition: opacity 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-add:hover { opacity: 0.85; }

    .habits-list { padding: 0 1.5rem; display: flex; flex-direction: column; gap: 8px; }
    .habit-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg3); border: 0.5px solid var(--border);
      border-radius: 12px; padding: 12px 14px;
      transition: border-color 0.2s;
    }
    .habit-row:hover { border-color: var(--border2); }
    .habit-check {
      width: 24px; height: 24px; border-radius: 50%;
      border: 1.5px solid var(--border2); background: transparent;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; transition: all 0.2s;
    }
    .habit-check.done { background: var(--accent); border-color: var(--accent); }
    .habit-check.done::after {
      content: ''; width: 8px; height: 5px;
      border-left: 2px solid #fff; border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translateY(-1px); display: block;
    }
    .habit-info { flex: 1; min-width: 0; }
    .habit-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .habit-name.done { color: var(--text3); text-decoration: line-through; }
    .habit-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
    .habit-tag { font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 500; letter-spacing: 0.3px; }
    .tag-salud { background: var(--green-bg); color: var(--green); }
    .tag-mente { background: var(--accent-light); color: var(--accent-text); }
    .tag-productividad { background: var(--amber-bg); color: var(--amber); }
    .tag-deporte { background: var(--red-bg); color: var(--red); }
    .habit-streak { font-size: 11px; color: var(--text3); }
    .habit-streak b { color: var(--amber); }
    .streak-dots { display: flex; gap: 3px; }
    .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); }
    .sdot.done { background: var(--accent); }
    .habit-delete {
      background: none; border: none; cursor: pointer; color: var(--text3);
      font-size: 18px; padding: 2px 6px; line-height: 1;
      opacity: 0.4; transition: opacity 0.15s;
    }
    .habit-delete:hover { opacity: 1; color: var(--red); }

    .progress-section { padding: 1rem 1.5rem; }
    .prog-bar-wrap { background: var(--bg2); border-radius: 20px; height: 8px; overflow: hidden; margin-top: 8px; }
    .prog-bar { height: 100%; background: var(--accent); border-radius: 20px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
    .prog-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }

    .week-heatmap { padding: 0 1.5rem 1rem; margin-top: 1.5rem; }
    .heatmap-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 10px; }
    .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .hm-cell { aspect-ratio: 1; border-radius: 5px; background: var(--bg2); transition: background 0.2s; }
    .hm-cell.l3 { background: var(--accent); }

    .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text3); }
    .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; }

    /* Modal */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--bg3); border-radius: 16px; padding: 1.5rem;
      width: 90%; max-width: 380px; border: 0.5px solid var(--border2);
    }
    .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; color: var(--text); }
    .field { margin-bottom: 12px; }
    .field label {
      display: block; font-size: 11px; color: var(--text3);
      margin-bottom: 5px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .field input, .field select {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 0.5px solid var(--border2); background: var(--bg2);
      color: var(--text); font-size: 14px; outline: none;
      font-family: 'DM Sans', sans-serif; transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 8px; margin-top: 1rem; }
    .btn-cancel {
      flex: 1; padding: 9px; border-radius: 8px;
      border: 0.5px solid var(--border2); background: none;
      color: var(--text2); cursor: pointer; font-size: 13px;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-cancel:hover { background: var(--bg2); }
    .btn-save {
      flex: 2; padding: 9px; border-radius: 8px;
      background: var(--accent); color: #fff; border: none;
      cursor: pointer; font-size: 13px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-save:hover { opacity: 0.9; }

    @media (max-width: 500px) {
      .stats-row { flex-wrap: wrap; }
      .stat-card { min-width: calc(50% - 5px); }
    }

    /* ── PANTALLA DE INICIO ── */
    #splash {
      position: fixed; inset: 0; z-index: 200;
      background: #0f0f0e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #splash.hide {
      opacity: 0; transform: translateY(-24px); pointer-events: none;
    }

    .splash-logo {
      font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 700;
      color: #7F77DD; letter-spacing: -1px;
      animation: fadeUp 0.7s ease both;
    }
    .splash-sub {
      font-size: 14px; color: #5F5E5A; margin-top: 6px; margin-bottom: 3rem;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .splash-card {
      background: #1a1a18; border: 0.5px solid rgba(127,119,221,0.25);
      border-radius: 20px; padding: 2rem 2rem 1.75rem;
      width: 100%; max-width: 360px;
      animation: fadeUp 0.7s 0.2s ease both;
    }
    .splash-card h2 {
      font-size: 18px; font-weight: 500; color: #F1EFE8;
      margin-bottom: 4px;
    }
    .splash-card p {
      font-size: 13px; color: #5F5E5A; margin-bottom: 1.5rem;
    }

    .splash-input-wrap { position: relative; margin-bottom: 1rem; }
    .splash-input-wrap input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      border: 0.5px solid rgba(127,119,221,0.3);
      background: #242422; color: #F1EFE8;
      font-size: 15px; outline: none;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
    }
    .splash-input-wrap input:focus { border-color: #7F77DD; }
    .splash-input-wrap input::placeholder { color: #444441; }

    .btn-enter {
      width: 100%; padding: 13px;
      background: #7F77DD; color: #fff;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.2px;
    }
    .btn-enter:hover { opacity: 0.9; }
    .btn-enter:active { transform: scale(0.98); }

    .splash-features {
      display: flex; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap;
    }
    .sf-pill {
      font-size: 11px; padding: 4px 10px; border-radius: 20px;
      background: rgba(127,119,221,0.1); color: #7F77DD;
      border: 0.5px solid rgba(127,119,221,0.2);
    }

    .splash-dots {
      display: flex; gap: 6px; margin-top: 2.5rem;
      animation: fadeUp 0.7s 0.35s ease both;
    }
    .splash-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #2C2C2A;
    }
    .splash-dot.on { background: #7F77DD; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* saludo en topbar */
    .user-greeting { font-size: 12px; color: var(--text3); margin-top: 2px; }
  </style>
</head>
<body>

<!-- PANTALLA DE INICIO -->
<div id="splash">
  <div class="splash-logo">rutinapp</div>
  <div class="splash-sub">tu planificador de hábitos</div>

  <div class="splash-card">
    <h2>¡Bienvenido!</h2>
    <p>¿Cómo te llamas? Personalizaremos tu espacio.</p>
    <div class="splash-input-wrap">
      <input type="text" id="splash-name" placeholder="Tu nombre..." maxlength="30" />
    </div>
    <button class="btn-enter" onclick="enterApp()">Empezar →</button>
    <div class="splash-features">
      <span class="sf-pill">seguimiento diario</span>
      <span class="sf-pill">rachas</span>
      <span class="sf-pill">estadísticas</span>
      <span class="sf-pill">modo oscuro</span>
    </div>
  </div>

  <div class="splash-dots">
    <div class="splash-dot on"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <div class="logo">rutinapp <span>planificador de hábitos</span></div>
      <div class="user-greeting" id="user-greeting"></div>
    </div>
    <button class="toggle-theme" onclick="toggleTheme()" id="theme-btn">☀ modo claro</button>
  </div>

  <div class="week-header">
    <div class="week-label">semana actual</div>
    <div class="week-days" id="week-days"></div>
  </div>

  <div class="stats-row" id="stats-row"></div>

  <div class="progress-section">
    <div class="prog-label">
      <span>progreso de hoy</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="prog-bar-wrap">
      <div class="prog-bar" id="prog-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">mis hábitos</div>
    <button class="btn-add" onclick="openModal()">+ añadir hábito</button>
  </div>

  <div class="habits-list" id="habits-list"></div>

  <div class="week-heatmap">
    <div class="heatmap-title">actividad de la semana</div>
    <div class="heatmap-grid" id="heatmap"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>nuevo hábito</h3>
    <div class="field">
      <label>nombre del hábito</label>
      <input type="text" id="inp-name" placeholder="ej: leer 20 minutos" maxlength="40" />
    </div>
    <div class="field">
      <label>categoría</label>
      <select id="inp-cat">
        <option value="salud">salud</option>
        <option value="mente">mente</option>
        <option value="productividad">productividad</option>
        <option value="deporte">deporte</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">cancelar</button>
      <button class="btn-save" onclick="saveHabit()">guardar hábito</button>
    </div>
  </div>
</div>

<script>
  let isDark = true;

  // ── SPLASH / LOGIN ──
  function enterApp() {
    const raw = document.getElementById('splash-name').value.trim();
    const name = raw || 'Tú';
    localStorage.setItem('rutinapp_user', name);
    showApp(name);
  }

  function showApp(name) {
    const splash = document.getElementById('splash');
    splash.classList.add('hide');
    setTimeout(() => splash.style.display = 'none', 650);
    const greet = document.getElementById('user-greeting');
    const hour = new Date().getHours();
    const saludo = hour < 14 ? 'Buenos días' : hour < 21 ? 'Buenas tardes' : 'Buenas noches';
    greet.textContent = saludo + ', ' + name + ' 👋';
  }

  document.getElementById('splash-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') enterApp();
  });

  // Si ya hay nombre guardado, saltar el splash
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('rutinapp_user');
    if (saved) showApp(saved);
  });

  let habits = [
    { id: 1, name: 'Meditar 10 minutos', cat: 'mente', streak: 5, weekDone: [1,2,3,1,0,0,0] },
    { id: 2, name: 'Beber 2L de agua', cat: 'salud', streak: 12, weekDone: [1,1,1,1,1,0,0] },
    { id: 3, name: 'Hacer ejercicio', cat: 'deporte', streak: 3, weekDone: [1,0,1,1,0,0,0] },
    { id: 4, name: 'Leer 30 minutos', cat: 'mente', streak: 7, weekDone: [1,1,1,1,1,0,0] },
    { id: 5, name: 'Revisar tareas del día', cat: 'productividad', streak: 2, weekDone: [0,1,1,1,0,0,0] },
  ];

  let todayChecked = {};
  habits.forEach(h => { todayChecked[h.id] = Math.random() > 0.4; });

  const dayNames = ['lun','mar','mié','jue','vie','sáb','dom'];
  const today = new Date();

  function getWeekDates() {
    const d = new Date(today);
    const day = d.getDay() || 7;
    d.setDate(d.getDate() - (day - 1));
    return Array.from({length:7}, (_,i) => {
      const nd = new Date(d);
      nd.setDate(d.getDate() + i);
      return nd;
    });
  }

  function renderWeekDays() {
    const dates = getWeekDates();
    const todayIdx = (today.getDay() || 7) - 1;
    document.getElementById('week-days').innerHTML = dates.map((d, i) => `
      <div class="day-pill ${i === todayIdx ? 'active' : ''}" onclick="selectDay(${i})">
        <div class="dname">${dayNames[i]}</div>
        <div class="dnum">${d.getDate()}</div>
      </div>
    `).join('');
  }

  function selectDay(i) {
    document.querySelectorAll('.day-pill').forEach((p, j) => p.classList.toggle('active', i === j));
  }

  function renderStats() {
    const total = habits.length;
    const done = Object.values(todayChecked).filter(Boolean).length;
    const maxStreak = Math.max(...habits.map(h => h.streak), 0);
    const avgStreak = total ? Math.round(habits.reduce((s, h) => s + h.streak, 0) / total) : 0;
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="stat-label">completados hoy</div><div class="stat-value">${done}<span>/${total}</span></div></div>
      <div class="stat-card"><div class="stat-label">racha máxima</div><div class="stat-value">${maxStreak}<span> días</span></div></div>
      <div class="stat-card"><div class="stat-label">racha media</div><div class="stat-value">${avgStreak}<span> días</span></div></div>
    `;
    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('prog-bar').style.width = pct + '%';
    document.getElementById('prog-pct').textContent = pct + '%';
  }

  function renderHabits() {
    const list = document.getElementById('habits-list');
    if (!habits.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">✦</div><p>aún no tienes hábitos.<br>¡añade tu primero!</p></div>`;
      return;
    }
    list.innerHTML = habits.map(h => {
      const done = todayChecked[h.id];
      const dots = h.weekDone.map(d => `<div class="sdot ${d ? 'done' : ''}"></div>`).join('');
      return `
      <div class="habit-row" id="hrow-${h.id}">
        <div class="habit-check ${done ? 'done' : ''}" onclick="toggle(${h.id})"></div>
        <div class="habit-info">
          <div class="habit-name ${done ? 'done' : ''}">${h.name}</div>
          <div class="habit-meta">
            <span class="habit-tag tag-${h.cat}">${h.cat}</span>
            <span class="habit-streak">racha: <b>${h.streak}🔥</b></span>
            <div class="streak-dots">${dots}</div>
          </div>
        </div>
        <button class="habit-delete" onclick="deleteHabit(${h.id})">×</button>
      </div>`;
    }).join('');
  }

  function renderHeatmap() {
    const grid = document.getElementById('heatmap');
    if (!habits.length) {
      grid.innerHTML = Array(7).fill('<div class="hm-cell"></div>').join('');
      return;
    }
    grid.innerHTML = habits.slice(0, 5).map(h =>
      h.weekDone.map(d => `<div class="hm-cell ${d ? 'l3' : ''}"></div>`).join('')
    ).join('');
  }

  function toggle(id) {
    todayChecked[id] = !todayChecked[id];
    const h = habits.find(x => x.id === id);
    if (h) h.streak = todayChecked[id] ? h.streak + 1 : Math.max(0, h.streak - 1);
    render();
  }

  function deleteHabit(id) {
    habits = habits.filter(h => h.id !== id);
    delete todayChecked[id];
    render();
  }

  function openModal() {
    document.getElementById('modal-bg').classList.add('open');
    setTimeout(() => document.getElementById('inp-name').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-bg').classList.remove('open');
    document.getElementById('inp-name').value = '';
  }

  function saveHabit() {
    const name = document.getElementById('inp-name').value.trim();
    const cat = document.getElementById('inp-cat').value;
    if (!name) return;
    const id = Date.now();
    habits.push({ id, name, cat, streak: 0, weekDone: [0,0,0,0,0,0,0] });
    todayChecked[id] = false;
    closeModal();
    render();
  }

  function toggleTheme() {
    isDark = !isDark;
    document.body.classList.toggle('light', !isDark);
    document.getElementById('theme-btn').textContent = isDark ? '☀ modo claro' : '☾ modo oscuro';
  }

  document.getElementById('inp-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveHabit();
    if (e.key === 'Escape') closeModal();
  });

  document.getElementById('modal-bg').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-bg')) closeModal();
  });

  function render() {
    renderWeekDays();
    renderStats();
    renderHabits();
    renderHeatmap();
  }

  render();
</script>
</body>
</html>
